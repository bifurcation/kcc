name: Update race statistics

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 18-23 * * 6'  # 08:00-13:45 HST Saturday
    - cron: '*/15 0-4 * * 0'    # 14:00-18:00 HST Saturday (UTC rolls to Sunday)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - run: npm install

    - run: python3 build.py

    - uses: EndBug/add-and-commit@v9
      with:
        add: 'docs'
        author_name: Race Stats Bot
        author_email: rlb@ipv.sx
        message: 'Update race statistics'
