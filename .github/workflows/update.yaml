name: Update race statistics

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 18-23 * * 6'  # 08:00-13:45 HST Saturday
    - cron: '*/15 0-4 * * 0'    # 14:00-18:00 HST Saturday (UTC rolls to Sunday)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - run: npm install

    - run: python3 build.py

    - name: Commit and push updated docs
      run: |
        git config user.name "Race Stats Bot"
        git config user.email "rlb@ipv.sx"
        git add docs/
        git diff --cached --quiet || git commit -m "Update race statistics"
        git push
