<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KCC 2026 — Season Overview</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<style>html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:#fff}
#wrap{height:100%;padding:8px;box-sizing:border-box}</style>
</head>
<body>
<div id="wrap"><canvas id="c" style="width:100%"></canvas></div>
<script>
const SUMMARY = {"labels": ["10", "12", "13", "14", "15", "16", "18", "Novice B", "Novice A", "Freshmen", "Sophomore", "Junior", "40", "50", "55", "60", "65", "70", "Open Four", "Open Mixed"], "datasets": [{"label": "Men", "data": [{"x": 0.0, "y": 364.16}, {"x": 1.0, "y": 274.02}, {"x": 2.0, "y": 275.84}, {"x": 3.0, "y": 262.91}, {"x": 4.0, "y": 274.13}, {"x": 5.0, "y": 258.37}, {"x": 6.0, "y": 251.71}, {"x": 7.0, "y": 237.07}, {"x": 8.0, "y": 249.44}, {"x": 9.0, "y": 233.26}, {"x": 10.0, "y": 252.29}, {"x": 11.0, "y": 248.26}, null, {"x": 13.0, "y": 273.03}, {"x": 14.0, "y": 284.16}, {"x": 15.0, "y": 276.0}, {"x": 16.0, "y": 266.24}, null, {"x": 18.0, "y": 259.14}, null], "errorBars": [{"lo": 316.64, "hi": 431.78}, {"lo": 270.82, "hi": 311.72}, {"lo": 257.63, "hi": 283.98}, {"lo": 256.43, "hi": 279.47}, {"lo": 265.88, "hi": 281.22}, {"lo": 255.18, "hi": 277.07}, {"lo": 238.46, "hi": 259.67}, {"lo": 225.94, "hi": 245.2}, {"lo": 244.77, "hi": 258.11}, {"lo": 233.26, "hi": 233.26}, {"lo": 252.21, "hi": 265.88}, {"lo": 248.26, "hi": 248.26}, null, {"lo": 270.04, "hi": 281.67}, {"lo": 281.9, "hi": 290.24}, {"lo": 264.93, "hi": 278.69}, {"lo": 254.87, "hi": 272.4}, null, {"lo": 248.14, "hi": 265.49}, null], "borderColor": "#1565C0", "backgroundColor": "#1565C0"}, {"label": "Women", "data": [{"x": 0.15, "y": 351.29}, {"x": 1.15, "y": 282.8}, {"x": 2.15, "y": 283.91}, {"x": 3.15, "y": 271.46}, {"x": 4.15, "y": 282.53}, {"x": 5.15, "y": 303.56}, {"x": 6.15, "y": 305.54}, {"x": 7.15, "y": 323.76}, {"x": 8.15, "y": 296.4}, {"x": 9.15, "y": 267.63}, {"x": 10.15, "y": 312.13}, null, {"x": 12.15, "y": 271.14}, {"x": 13.15, "y": 310.07}, {"x": 14.15, "y": 295.33}, {"x": 15.15, "y": 336.63}, {"x": 16.15, "y": 320.17}, {"x": 17.15, "y": 319.28}, {"x": 18.15, "y": 343.04}, null], "errorBars": [{"lo": 320.04, "hi": 434.93}, {"lo": 268.57, "hi": 295.39}, {"lo": 280.41, "hi": 296.29}, {"lo": 258.32, "hi": 285.18}, {"lo": 278.06, "hi": 287.73}, {"lo": 291.9, "hi": 309.24}, {"lo": 291.81, "hi": 322.34}, {"lo": 323.76, "hi": 323.76}, {"lo": 287.84, "hi": 304.34}, {"lo": 261.01, "hi": 271.82}, {"lo": 301.88, "hi": 320.58}, null, {"lo": 267.43, "hi": 278.85}, {"lo": 294.35, "hi": 316.13}, {"lo": 283.73, "hi": 303.04}, {"lo": 331.24, "hi": 342.06}, {"lo": 292.11, "hi": 322.48}, {"lo": 294.0, "hi": 330.32}, {"lo": 316.05, "hi": 355.5}, null], "borderColor": "#AD1457", "backgroundColor": "#AD1457"}, {"label": "Mixed", "data": [null, {"x": 1.3, "y": 287.23}, null, null, null, null, {"x": 6.3, "y": 268.84}, {"x": 7.3, "y": 270.14}, null, null, null, null, {"x": 12.3, "y": 274.74}, null, {"x": 14.3, "y": 280.22}, null, null, null, null, {"x": 19.0, "y": 283.43}], "errorBars": [null, {"lo": 269.2, "hi": 312.75}, null, null, null, null, {"lo": 260.9, "hi": 271.47}, {"lo": 254.52, "hi": 289.42}, null, null, null, null, {"lo": 269.05, "hi": 296.93}, null, {"lo": 269.88, "hi": 304.74}, null, null, null, null, {"lo": 274.74, "hi": 295.41}], "borderColor": "#2E7D32", "backgroundColor": "#2E7D32"}], "yMin": 215.5, "yMax": 445.4};
const THUMB = new URLSearchParams(location.search).has("thumb");
function mmss(v){let m=Math.floor(v/60);let s=(v-m*60).toFixed(2).padStart(5,"0");return m+":"+s;}

const errorBarPlugin = {
  id:"errorBars",
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, di) => {
      if (!ds.errorBars) return;
      const meta = chart.getDatasetMeta(di);
      if (meta.hidden) return;
      meta.data.forEach(pt => {
        if (!pt || isNaN(pt.x) || isNaN(pt.y)) return;
        const eb = ds.errorBars[Math.round(chart.scales.x.getValueForPixel(pt.x))];
        if (!eb) return;
        const x = pt.x;
        const yLo = chart.scales.y.getPixelForValue(eb.lo);
        const yHi = chart.scales.y.getPixelForValue(eb.hi);
        const cap = THUMB ? 3 : 5;
        ctx.save();
        ctx.strokeStyle = ds.borderColor;
        ctx.lineWidth = THUMB ? 1 : 1.5;
        ctx.beginPath();
        ctx.moveTo(x, yLo); ctx.lineTo(x, yHi);
        ctx.moveTo(x-cap, yLo); ctx.lineTo(x+cap, yLo);
        ctx.moveTo(x-cap, yHi); ctx.lineTo(x+cap, yHi);
        ctx.stroke();
        ctx.restore();
      });
    });
  }
};

window.onload = function() {
  const datasets = SUMMARY.datasets.map(ds => ({
    label: ds.label, data: ds.data.filter(p => p !== null), errorBars: ds.errorBars,
    borderColor: ds.borderColor, backgroundColor: ds.borderColor,
    pointRadius: THUMB ? 3 : 5, pointHoverRadius: 7, pointStyle: "circle",
  }));
  new Chart(document.getElementById("c"), {
    type: "scatter",
    data: {datasets},
    options: {
      responsive: true, maintainAspectRatio: true, aspectRatio: 1.5, animation: false,
      interaction: {mode:"nearest", intersect:true},
      plugins: {
        title: {display:!THUMB, text:"KCC 2026 — Median Finish Times by Classification", font:{size:18}},
        legend: {display:!THUMB},
        tooltip: {enabled:!THUMB, callbacks:{
          title: items => SUMMARY.labels[Math.round(items[0].parsed.x)],
          label: c => {
            const eb = c.dataset.errorBars[Math.round(c.parsed.x)];
            const med = c.dataset.label + ": " + mmss(c.parsed.y);
            return eb ? med + "  (" + mmss(eb.lo) + " – " + mmss(eb.hi) + ")" : med;
          },
        }},
      },
      scales: {
        x: {
          display:!THUMB, type:"linear",
          min:-0.5, max:SUMMARY.labels.length-0.5,
          afterBuildTicks(axis) {
            axis.ticks = Array.from({length:SUMMARY.labels.length}, (_,i) => ({value:i}));
          },
          ticks:{
            callback: v => SUMMARY.labels[v] || "",
            maxRotation:45, minRotation:45, font:{size:11},
          },
        },
        y: {display:!THUMB, title:{display:!THUMB, text:"Finish time (min:sec)"},
            min:0, max:SUMMARY.yMax,
            ticks:{stepSize:15, callback:v=>mmss(v)}},
      },
    },
    plugins: [errorBarPlugin],
  });
};
</script>
</body>
</html>
