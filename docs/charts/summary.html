<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KCC 2026 — Season Overview</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<style>html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:#fff}
#wrap{height:100%;padding:8px;box-sizing:border-box}</style>
</head>
<body>
<div id="wrap"><canvas id="c" style="width:100%"></canvas></div>
<script>
const SUMMARY = {"labels": ["10", "12", "13", "14", "15", "16", "18", "Novice B", "Novice A", "Freshmen", "Sophomore", "Junior", "40", "50", "55", "60", "65", "70", "Open Four", "Open Mixed"], "datasets": [{"label": "Men", "data": [{"x": 0.0, "y": 340.83}, {"x": 1.0, "y": 272.91}, {"x": 2.0, "y": 249.17}, {"x": 3.0, "y": 248.75}, {"x": 4.0, "y": 258.9}, {"x": 5.0, "y": 255.18}, {"x": 6.0, "y": 238.46}, {"x": 7.0, "y": 226.36}, {"x": 8.0, "y": 245.99}, {"x": 9.0, "y": 222.56}, {"x": 10.0, "y": 252.21}, {"x": 11.0, "y": 239.75}, null, {"x": 13.0, "y": 267.13}, {"x": 14.0, "y": 281.9}, {"x": 15.0, "y": 264.93}, {"x": 16.0, "y": 257.44}, null, {"x": 18.0, "y": 262.99}, null], "errorBars": [{"lo": 309.25, "hi": 431.78}, {"lo": 255.19, "hi": 311.72}, {"lo": 227.98, "hi": 283.98}, {"lo": 220.92, "hi": 279.47}, {"lo": 246.79, "hi": 281.22}, {"lo": 242.88, "hi": 277.07}, {"lo": 230.37, "hi": 259.67}, {"lo": 206.05, "hi": 245.2}, {"lo": 240.43, "hi": 258.11}, {"lo": 221.3, "hi": 233.26}, {"lo": 222.93, "hi": 265.88}, {"lo": 231.24, "hi": 248.26}, null, {"lo": 243.04, "hi": 281.67}, {"lo": 263.57, "hi": 290.24}, {"lo": 254.67, "hi": 278.69}, {"lo": 249.15, "hi": 272.4}, null, {"lo": 248.14, "hi": 284.93}, null], "borderColor": "#1565C0", "backgroundColor": "#1565C0"}, {"label": "Women", "data": [{"x": 0.15, "y": 326.51}, {"x": 1.15, "y": 275.54}, {"x": 2.15, "y": 283.91}, {"x": 3.15, "y": 265.65}, {"x": 4.15, "y": 272.77}, {"x": 5.15, "y": 286.24}, {"x": 6.15, "y": 301.25}, {"x": 7.15, "y": 295.03}, {"x": 8.15, "y": 287.84}, {"x": 9.15, "y": 266.63}, {"x": 10.15, "y": 307.0}, null, {"x": 12.15, "y": 270.32}, {"x": 13.15, "y": 294.35}, {"x": 14.15, "y": 291.16}, {"x": 15.15, "y": 331.24}, {"x": 16.15, "y": 319.67}, {"x": 17.15, "y": 308.38}, {"x": 18.15, "y": 324.99}, null], "errorBars": [{"lo": 305.11, "hi": 434.93}, {"lo": 246.33, "hi": 295.39}, {"lo": 267.1, "hi": 298.73}, {"lo": 241.96, "hi": 285.18}, {"lo": 255.47, "hi": 287.73}, {"lo": 266.3, "hi": 309.24}, {"lo": 282.67, "hi": 322.34}, {"lo": 261.26, "hi": 323.76}, {"lo": 275.75, "hi": 304.34}, {"lo": 259.22, "hi": 271.82}, {"lo": 296.03, "hi": 320.58}, null, {"lo": 254.46, "hi": 278.85}, {"lo": 277.18, "hi": 316.13}, {"lo": 261.57, "hi": 303.04}, {"lo": 301.19, "hi": 342.06}, {"lo": 292.11, "hi": 322.48}, {"lo": 294.0, "hi": 330.32}, {"lo": 299.54, "hi": 355.5}, null], "borderColor": "#AD1457", "backgroundColor": "#AD1457"}, {"label": "Mixed", "data": [null, {"x": 1.3, "y": 272.14}, null, null, null, null, {"x": 6.3, "y": 260.9}, {"x": 7.3, "y": 260.34}, null, null, null, null, {"x": 12.3, "y": 273.67}, null, {"x": 14.3, "y": 270.0}, null, null, null, null, {"x": 19.0, "y": 276.99}], "errorBars": [null, {"lo": 244.02, "hi": 312.75}, null, null, null, null, {"lo": 247.1, "hi": 271.47}, {"lo": 232.74, "hi": 289.42}, null, null, null, null, {"lo": 263.74, "hi": 296.93}, null, {"lo": 252.95, "hi": 304.74}, null, null, null, null, {"lo": 253.69, "hi": 295.41}], "borderColor": "#2E7D32", "backgroundColor": "#2E7D32"}], "yMin": 194.6, "yMax": 446.4};
const THUMB = new URLSearchParams(location.search).has("thumb");
function mmss(v){let m=Math.floor(v/60);let s=(v-m*60).toFixed(2).padStart(5,"0");return m+":"+s;}

const errorBarPlugin = {
  id:"errorBars",
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, di) => {
      if (!ds.errorBars) return;
      const meta = chart.getDatasetMeta(di);
      if (meta.hidden) return;
      meta.data.forEach(pt => {
        if (!pt || isNaN(pt.x) || isNaN(pt.y)) return;
        const eb = ds.errorBars[Math.round(chart.scales.x.getValueForPixel(pt.x))];
        if (!eb) return;
        const x = pt.x;
        const yLo = chart.scales.y.getPixelForValue(eb.lo);
        const yHi = chart.scales.y.getPixelForValue(eb.hi);
        const cap = THUMB ? 3 : 5;
        ctx.save();
        ctx.strokeStyle = ds.borderColor;
        ctx.lineWidth = THUMB ? 1 : 1.5;
        ctx.beginPath();
        ctx.moveTo(x, yLo); ctx.lineTo(x, yHi);
        ctx.moveTo(x-cap, yLo); ctx.lineTo(x+cap, yLo);
        ctx.moveTo(x-cap, yHi); ctx.lineTo(x+cap, yHi);
        ctx.stroke();
        ctx.restore();
      });
    });
  }
};

window.onload = function() {
  const datasets = SUMMARY.datasets.map(ds => ({
    label: ds.label, data: ds.data.filter(p => p !== null), errorBars: ds.errorBars,
    borderColor: ds.borderColor, backgroundColor: ds.borderColor,
    pointRadius: THUMB ? 3 : 5, pointHoverRadius: 7, pointStyle: "circle",
  }));
  new Chart(document.getElementById("c"), {
    type: "scatter",
    data: {datasets},
    options: {
      responsive: true, maintainAspectRatio: true, aspectRatio: 1.5, animation: false,
      interaction: {mode:"nearest", intersect:true},
      plugins: {
        title: {display:!THUMB, text:"KCC 2026 — Median Finish Times by Classification", font:{size:18}},
        legend: {display:!THUMB},
        tooltip: {enabled:!THUMB, callbacks:{
          title: items => SUMMARY.labels[Math.round(items[0].parsed.x)],
          label: c => {
            const eb = c.dataset.errorBars[Math.round(c.parsed.x)];
            const med = c.dataset.label + ": " + mmss(c.parsed.y);
            return eb ? med + "  (" + mmss(eb.lo) + " – " + mmss(eb.hi) + ")" : med;
          },
        }},
      },
      scales: {
        x: {
          display:!THUMB, type:"linear",
          min:-0.5, max:SUMMARY.labels.length-0.5,
          afterBuildTicks(axis) {
            axis.ticks = Array.from({length:SUMMARY.labels.length}, (_,i) => ({value:i}));
          },
          ticks:{
            callback: v => SUMMARY.labels[v] || "",
            maxRotation:45, minRotation:45, font:{size:11},
          },
        },
        y: {display:!THUMB, title:{display:!THUMB, text:"Finish time (min:sec)"},
            min:0, max:SUMMARY.yMax,
            ticks:{stepSize:15, callback:v=>mmss(v)}},
      },
    },
    plugins: [errorBarPlugin],
  });
};
</script>
</body>
</html>
